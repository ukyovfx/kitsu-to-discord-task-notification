services:
  app:
    container_name: ${ALIAS}
    image: ${ALIAS}-image
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      - APP_ENV=production
    volumes:
      - "../conf.toml:/app/conf.toml"
      - "../docs.html:/app/docs.html"
      - "../site.jsx:/app/site.jsx"
      - "../diagrams:/app/diagrams"
      - "../tpl:/app/tpl"
      - "../data:/app/data"
      - "../data/sqlite.db:/app/sqlite.db"
    networks:
      - proxy
    labels:
      # ── HTTPS router ────────────────────────────────────────────────
      - "traefik.enable=true"
      - "traefik.http.routers.${ALIAS}.rule=Host(`${PUBLIC_HOST}`)"
      - "traefik.http.routers.${ALIAS}.entrypoints=websecure"
      - "traefik.http.routers.${ALIAS}.tls=true"
      - "traefik.http.routers.${ALIAS}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${ALIAS}.middlewares=${ALIAS}Headers,${ALIAS}RateLimit"
      - "traefik.http.services.${ALIAS}.loadbalancer.server.port=8090"
      # ── Rate limiting ────────────────────────────────────────────────────
      - "traefik.http.middlewares.${ALIAS}RateLimit.ratelimit.average=10"
      - "traefik.http.middlewares.${ALIAS}RateLimit.ratelimit.period=1s"
      - "traefik.http.middlewares.${ALIAS}RateLimit.ratelimit.burst=20"
      # ── HTTP → HTTPS redirect router ────────────────────────────────
      - "traefik.http.routers.${ALIAS}-http.rule=Host(`${PUBLIC_HOST}`)"
      - "traefik.http.routers.${ALIAS}-http.entrypoints=web"
      - "traefik.http.routers.${ALIAS}-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
      # ── Security / CORS headers ──────────────────────────────────────
      - "traefik.http.middlewares.${ALIAS}Headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.${ALIAS}Headers.headers.sslProxyHeaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.${ALIAS}Headers.headers.accesscontrolallowmethods=GET,POST,OPTIONS,PUT,DELETE"
      - "traefik.http.middlewares.${ALIAS}Headers.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.${ALIAS}Headers.headers.accesscontrolalloworiginlist=https://${PUBLIC_HOST}"
      - "traefik.http.middlewares.${ALIAS}Headers.headers.accesscontrolallowheaders=content-type,authorization"
      - "traefik.http.middlewares.${ALIAS}Headers.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.${ALIAS}Headers.headers.addvaryheader=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./conf.toml:/app/conf.toml
      - ./docs.html:/app/docs.html
      - ./site.jsx:/app/site.jsx
      - ./diagrams:/app/diagrams
      - ./tpl:/app/tpl
      - ./data:/app/data
    environment:
      - APP_ENV=development
      - TZ=Asia/Tokyo
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  editor:
    profiles:
      - debug
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8080:80"
    volumes:
      - filebrowser_data:/database
      - ./README.md:/srv/README.md:ro
      - ./docs.html:/srv/docs.html:ro
      - ./site.jsx:/srv/site.jsx:ro
      - ./diagrams:/srv/diagrams:ro
      - ./tpl:/srv/tpl:ro
    environment:
      - PUID=1000
      - PGID=1000
      - FB_USERNAME=${FB_USERNAME}
      - FB_PASSWORD=${FB_PASSWORD}

volumes:
  filebrowser_data:

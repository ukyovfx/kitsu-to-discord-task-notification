name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Install SQLite build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Mojibake regression check
        shell: bash
        run: |
          set -euo pipefail
          pattern='зӘ¶гғ»|з№§|з¬Ҹ|з«Ҡ|йҡұ|иӯҒ|иӯҢ|иңҝ|зёә'
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "$base_ref"
            files="$(git diff --name-only "origin/$base_ref...HEAD")"
          else
            files="$(git diff --name-only HEAD~1 HEAD || true)"
            if [[ -z "$files" ]]; then
              files="$(git ls-files)"
            fi
          fi

          bad=0
          for f in $files; do
            [[ -f "$f" ]] || continue
            [[ "$f" == ".github/workflows/build.yml" ]] && continue
            if command -v rg >/dev/null 2>&1; then
              if rg -n "$pattern" "$f"; then
                bad=1
              fi
            else
              if grep -n -E "$pattern" "$f"; then
                bad=1
              fi
            fi
          done

          if [[ "$bad" -ne 0 ]]; then
            echo "Mojibake-like text detected in changed files."
            exit 1
          fi

      - name: go vet
        run: CGO_ENABLED=1 go vet ./src/...

      - name: go test
        run: CGO_ENABLED=1 go test ./src/... -count=1 -timeout=120s

      - name: Prepare CI env.local
        run: |
          cp .env.example .env.local
          cat >> .env.local <<'VARS'
          KITSU_HOSTNAME=http://ci.invalid/
          DISCORD_BOT_TOKEN=ci-placeholder-token
          DISCORD_GUILD_ID=000000000000000000
          FB_PASSWORD=ci-password
          VARS

      - name: Docker Compose config
        env:
          FB_USERNAME: ci-user
          FB_PASSWORD: ci-password
        run: docker compose config -q

      - name: Docker Compose build app
        env:
          FB_USERNAME: ci-user
          FB_PASSWORD: ci-password
        run: docker compose build app

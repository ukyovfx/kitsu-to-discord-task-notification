version: '3.8'
services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./conf.toml:/app/conf.toml
      - ./tpl:/app/tpl
      - ./data:/app/data
      - ./data/sqlite.db:/app/sqlite.db
    environment:
      - TZ=Asia/Tokyo
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  editor:
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:80"
    volumes:
      - .:/srv
      - ./data:/database
    environment:
      - PUID=1000
      - PGID=1000

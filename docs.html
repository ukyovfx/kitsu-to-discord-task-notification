<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KitsuSync Pipeline Docs</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
html,body,#root{margin:0;min-height:100%;background:#050606;color:#f5f5f2;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body:before{content:"";position:fixed;inset:-20%;pointer-events:none;background-image:radial-gradient(circle,rgba(255,111,54,.55) 0 1px,transparent 2px),radial-gradient(circle,rgba(255,255,255,.26) 0 1px,transparent 2px);background-size:58px 58px,92px 92px;animation:docDrift 20s linear infinite;opacity:.23}
body:after{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 74% 12%,rgba(232,80,2,.28),transparent 32%),radial-gradient(circle at 12% 92%,rgba(255,255,255,.08),transparent 28%)}
@keyframes docDrift{from{transform:translate3d(0,0,0)}to{transform:translate3d(58px,92px,0)}}
.docs-fallback{position:relative;z-index:2;max-width:1180px;margin:28px auto 0;padding:18px 24px;border:1px solid rgba(255,255,255,.14);border-radius:22px;background:rgba(0,0,0,.48);backdrop-filter:blur(16px);box-shadow:0 20px 48px rgba(0,0,0,.34)}
.docs-fallback strong{display:block;font-size:18px;margin-bottom:8px}
.docs-fallback p{margin:0;color:#d3cdc4;line-height:1.6}
.docs-ready .docs-fallback{display:none}
.site{position:relative;z-index:1;display:flex;min-height:100vh}.nav{position:sticky;top:0;width:280px;height:100vh;padding:28px 18px;background:rgba(0,0,0,.62);backdrop-filter:blur(18px);border-right:1px solid rgba(255,255,255,.1);box-sizing:border-box;overflow:auto}.brand{font-size:1.1rem;font-weight:800;letter-spacing:.02em}.brand small,.meta{display:block;margin-top:8px;color:#aaa;font-size:.75rem}.navlink{display:flex;gap:10px;align-items:center;margin:8px 0;padding:11px 12px;border:1px solid rgba(255,255,255,.08);border-radius:16px;color:#ddd;text-decoration:none;background:rgba(255,255,255,.035);transition:.22s ease}.navlink:hover,.navlink.active{border-color:rgba(232,80,2,.6);background:rgba(232,80,2,.14);transform:translateX(3px)}.num{color:#ff6f36;font-weight:800}.navtitle{margin:24px 4px 10px;color:#999;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em}.body{flex:1;min-width:0}.container{max-width:1180px;margin:0 auto;padding:0 32px}.hero{padding:70px 0 36px}.hero h1{font-size:clamp(44px,8vw,96px);line-height:.9;margin:0 0 18px}.lead{max-width:820px;color:#c9c5bd;font-size:1.05rem}.toc{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}.toc a{cursor:pointer;border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:8px 12px;color:#f5f5f2;background:rgba(255,255,255,.04)}.doc{margin:18px 0 28px;padding:26px;border:1px solid rgba(255,255,255,.12);border-radius:28px;background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.035));box-shadow:0 24px 70px rgba(0,0,0,.34);backdrop-filter:blur(18px);animation:rise .42s ease both}.kicker{color:#ff7a3c;text-transform:uppercase;letter-spacing:.14em;font-size:.75rem}.docnum{display:flex;gap:14px;align-items:center;margin:.35em 0 .15em;font-size:1.7rem}.docsub{margin:0 0 16px;color:#bdb8ae;font-size:1rem;font-weight:500}.doc-intro,li,td{color:#d7d3ca;line-height:1.65}.box{border:1px solid rgba(255,255,255,.1);border-radius:20px;background:rgba(0,0,0,.22);padding:18px}.adm{width:100%;border-collapse:collapse}.adm th,.adm td{border-bottom:1px solid rgba(255,255,255,.1);padding:12px;text-align:left}.adm th{color:#fff}.pipeline-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.pipe-card strong{display:block;color:#fff}.pipe-card span{display:block;color:#aaa;margin-top:6px}.pipeline-list{display:grid;gap:18px}.pipeline-detail{display:grid;gap:16px}.flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;align-items:stretch}.flow-step{border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px;background:rgba(255,255,255,.04);min-height:86px}.flow-step strong{display:block;color:#fff;margin-bottom:6px}.flow-step span{color:#aaa;font-size:.88rem;line-height:1.45}.kv{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.kv div{border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(0,0,0,.2);padding:12px}.kv b{display:block;color:#ff7a3c;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px}.kv span{color:#d7d3ca;line-height:1.5}.foot{display:flex;justify-content:space-between;padding:32px;color:#8f8a82}.toggle{cursor:pointer}@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}@media(max-width:900px){.site{display:block}.nav{position:relative;width:auto;height:auto}.pipeline-grid,.kv{grid-template-columns:1fr}.container{padding:0 18px}.hero{padding-top:36px}.flow{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="docs-fallback" class="docs-fallback">
  <strong>KitsuSync docs</strong>
  <p>Docs is loading. If it stays blank, the same-origin `site.jsx` load or an external CDN likely failed.</p>
</div>
<div id="root"></div>
<script type="text/babel" src="/bot/docs/site.jsx"></script>
</body>
</html>

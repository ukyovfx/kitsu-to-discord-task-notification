name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Install SQLite build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Mojibake regression check
        shell: bash
        run: |
          set -euo pipefail
          pattern=$'\u7AB6\u30FB|\u7E67|\u7B0F|\u7ACA|\u96B1|\u8B41|\u8B4C|\u873F|\u7E3A'

          tmp="$(mktemp)"
          cleanup() { rm -f "$tmp"; }
          trap cleanup EXIT

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "$base_ref"
            git diff --name-only -z "origin/$base_ref...HEAD" > "$tmp" || true
          else
            before="${{ github.event.before }}"
            sha="${{ github.sha }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              git diff --name-only -z "$before...$sha" > "$tmp" || true
            fi
          fi

          if [[ ! -s "$tmp" ]]; then
            git ls-files -z > "$tmp"
          fi

          bad=0
          while IFS= read -r -d '' f; do
            [[ -f "$f" ]] || continue
            [[ "$f" == ".github/workflows/build.yml" ]] && continue
            if command -v rg >/dev/null 2>&1; then
              if rg -n -I "$pattern" "$f"; then
                bad=1
              fi
            else
              if grep -Iq . "$f" && grep -n -E "$pattern" "$f"; then
                bad=1
              fi
            fi
          done < "$tmp"

          if [[ "$bad" -ne 0 ]]; then
            echo "Mojibake-like text detected in checked files."
            exit 1
          fi

      - name: go vet
        run: CGO_ENABLED=1 go vet ./src/...

      - name: go test
        run: CGO_ENABLED=1 go test ./src/... -count=1 -timeout=120s

      - name: Prepare CI env.local
        run: |
          cp .env.example .env.local
          cat >> .env.local <<'VARS'
          KITSU_HOSTNAME=http://ci.invalid/
          DISCORD_BOT_TOKEN=ci-placeholder-token
          DISCORD_GUILD_ID=000000000000000000
          FB_PASSWORD=ci-password
          VARS

      - name: Docker Compose config
        env:
          FB_USERNAME: ci-user
          FB_PASSWORD: ci-password
        run: docker compose config -q

      - name: Docker Compose build app
        env:
          FB_USERNAME: ci-user
          FB_PASSWORD: ci-password
        run: docker compose build app
